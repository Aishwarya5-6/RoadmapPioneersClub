<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Pioneers Roadmap Hub | GITAM Hyderabad</title>
<meta name="description" content="Scan, select your domain, and discover your personalized career roadmap — brought to you by Pioneers Club, GITAM Hyderabad." />
<meta name="theme-color" content="#0a0e17" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated background -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--2" aria-hidden="true"></div>

  <!-- ===================== HEADER ===================== -->
  <header class="site-header">
    <div class="brand">
      <span class="brand-badge">🧭</span>
      <div class="brand-text">
        <span class="brand-name">Pioneers Club</span>
        <span class="brand-sub">GITAM Hyderabad</span>
      </div>
    </div>
    <button id="themeToggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">🌙</button>
  </header>

  <main id="app" class="app">

    <!-- ===================== HOME VIEW ===================== -->
    <section id="view-home" class="view view--home active">
      <div class="hero">
        <h1 class="hero-title">
          <span class="rocket">🚀</span> Pioneers Roadmap Hub
        </h1>
        <p class="hero-subtitle">Confused about where to start? Choose your domain and discover your journey.</p>

        <div class="search-wrap">
          <span class="search-icon">🔎</span>
          <input id="searchInput" type="text" class="search-input" placeholder="Search a domain or sub-domain (e.g. AI, Marketing, Physics)..." autocomplete="off" />
          <button id="searchClear" class="search-clear" aria-label="Clear search">✕</button>
        </div>
      </div>

      <div id="domainGrid" class="card-grid"></div>
      <div id="searchResults" class="card-grid search-results-grid"></div>
      <p id="noResults" class="no-results hidden">😕 No matching domain or roadmap found. Try another keyword.</p>
    </section>

    <!-- ===================== SUBDOMAIN LIST VIEW ===================== -->
    <section id="view-subdomains" class="view view--subdomains">
      <nav class="breadcrumb" id="subBreadcrumb"></nav>
      <button class="back-btn" data-back-to="home">← Back to Domains</button>
      <div class="section-heading" id="subHeading"></div>
      <div id="subdomainGrid" class="card-grid"></div>
    </section>

    <!-- ===================== CATEGORY VIEW (Pure Sciences only) ===================== -->
    <section id="view-categories" class="view view--categories">
      <nav class="breadcrumb" id="catBreadcrumb"></nav>
      <button class="back-btn" data-back-to="home">← Back to Domains</button>
      <div class="section-heading" id="catHeading"></div>
      <div id="categoryGrid" class="card-grid"></div>
    </section>

    <!-- ===================== ROADMAP VIEW ===================== -->
    <section id="view-roadmap" class="view view--roadmap">
      <nav class="breadcrumb" id="roadmapBreadcrumb"></nav>
      <button class="back-btn" id="roadmapBackBtn">← Back</button>

      <div class="roadmap-hero" id="roadmapHero"></div>

      <div class="timeline" id="roadmapTimeline"></div>

      <div class="roadmap-footer-nav">
        <button class="back-btn back-btn--ghost" data-back-to="home">🏠 Back to Home</button>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>Built with 💙 by <strong>Pioneers Club, GITAM Hyderabad</strong></p>
    <p class="footer-tag">Scan. Choose. Discover your roadmap. 🚀</p>
  </footer>

  <button id="scrollTopBtn" class="scroll-top-btn" aria-label="Scroll to top">↑</button>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
